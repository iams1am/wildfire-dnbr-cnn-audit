# Conda environment file for the wildfire benchmark framework.
# Pinned to the versions used to generate every table and figure.
#
# Usage:
#   conda env create -f environment.yml
#   conda activate wildfire
#   pip install hdf5plugin huggingface_hub  # not on conda-forge as a single bundle
#
# Reference hardware: NVIDIA RTX 3080 Ti (12 GB VRAM), CUDA 12.1, Python 3.12.
# Tested on Windows 11 and Ubuntu 22.04 (WSL2).
name: wildfire
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pytorch=2.5.1
  - torchvision=0.20.1
  - pytorch-cuda=12.1
  - numpy>=1.26
  - pandas>=2.2
  - scipy>=1.12
  - scikit-learn>=1.4
  - matplotlib>=3.8
  - seaborn>=0.13
  - tqdm>=4.66
  - pyyaml>=6.0
  - rasterio>=1.3
  - geopandas>=0.14
  - shapely>=2.0
  - pyproj>=3.6
  - rioxarray>=0.15
  - affine>=2.4
  - requests>=2.32
  - tabulate>=0.9
  - h5py>=3.10
  - pip
  - pip:
      # Packages reliably installed only via pip
      - hdf5plugin>=4.0           # Blosc2 + Zstd filters for CaBuAr HDF5 read
      - huggingface_hub>=0.20     # CaBuAr download from HuggingFace Hub
      - pystac-client>=0.7        # STAC retrieval against Microsoft Planetary Computer
      - planetary-computer>=1.0   # SAS-token signing for STAC asset URLs
